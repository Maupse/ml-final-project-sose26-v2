[experiment]
name = "random-forest-v1"
seed = 727
dataset = "data/processed/structural-v1.csv"
features = [
  "latitude",
  "longitude",
  "distance_to_city_center_km",
  "neighbourhood_cleansed",
  "property_type_clean",
  "room_type",
  "accommodates",
  "bedrooms",
  "bedrooms_missing",
  "beds",
  "beds_missing",
  "bathroom_count",
  "bathroom_privacy",
  "bathroom_information_missing",
  "has_license",
  "amenity_count",
  "has_wifi",
  "has_kitchen",
  "has_parking",
  "has_washer",
  "has_air_conditioning",
  "has_workspace",
  "has_balcony",
  "has_dryer",
  "has_elevator",
  "has_smoke_alarm",
  "allows_pets",
]
target = "log1_price"

[data_split]
train = 0.7
validation = 0.1
test = 0.2

[preprocessing]
version = "v2"

[training]
model = "random-forest"

# Random-forest search space
n_estimators = [200, 500]
max_depth = [-1, 10, 20, 40]
min_samples_leaf = [1, 2, 5, 10]
max_features = ["sqrt", 0.5, 1.0]
bootstrap = [true]

[search]
# RandomizedSearchCV settings
n_iter = 30
n_jobs = -1