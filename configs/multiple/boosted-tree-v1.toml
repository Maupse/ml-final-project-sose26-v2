[experiment]
name = "boosted-tree-v1"
seed = 727
dataset = "data/processed/structural-v1.csv"
features = [
  "latitude",
  "longitude",
  "distance_to_city_center_km",
  "neighbourhood_cleansed",
  "property_type_clean",
  "room_type",
  "accommodates",
  "bedrooms",
  "bedrooms_missing",
  "beds",
  "beds_missing",
  "bathroom_count",
  "bathroom_privacy",
  "bathroom_information_missing",
  "has_license",
  "amenity_count",
  "has_wifi",
  "has_kitchen",
  "has_parking",
  "has_washer",
  "has_air_conditioning",
  "has_workspace",
  "has_balcony",
  "has_dryer",
  "has_elevator",
  "has_smoke_alarm",
  "allows_pets",
]
target = "log1_price"

[data_split]
train = 0.8
test = 0.2
k = 5

[preprocessing]
version = "v2"

[training]
model = "boosted-tree"

# GradientBoostingRegressor search space
n_estimators = [100, 200, 400]
learning_rate = [0.03, 0.05, 0.1]
max_depth = [2, 3, 5]
min_samples_leaf = [1, 5, 10]
subsample = [0.7, 0.9, 1.0]
loss = ["squared_error", "huber"]

[search]
# RandomizedSearchCV settings
n_iter = 30
n_jobs = -1